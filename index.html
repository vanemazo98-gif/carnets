<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carnet</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      text-align: center;
      background-color: #f2f2f2;
    }

    .header img {
      width: auto;
      max-width: 400px;
    }

    .footer img {
      width: auto;
      max-width: 400px;
    }

    .contenedor {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .card {
      width: 90%;
      max-width: 350px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
    }

    .nombre {
      font-size: 20px;
      font-weight: bold;
    }

    .dato {
      margin: 8px 0;
    }

    .activo {
      color: green;
      font-weight: bold;
    }

    .inactivo {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- 🔝 ENCABEZADO CON IMAGEN -->
<div class="header">
  <img src="header.png" alt="encabezado">
</div>

<!-- 📇 CONTENIDO -->
<div class="contenedor">
  <div id="contenido"></div>
</div>

<!-- 🔻 PIE CON IMAGEN -->
<div class="footer">
  <img src="footer.png" alt="pie">
</div>

<script>
const url = "https://opensheet.elk.sh/1_o7wwmT3T9LA4CISZ6fhOiuaq_QfFljKzjHTwDkrKE0/Hoja1";

const params = new URLSearchParams(window.location.search);
const codigoURL = params.get("codigo");

fetch(url)
  .then(res => res.json())
  .then(data => {

    const contenedor = document.getElementById("contenido");

    const persona = data.find(est => 
      est.CODIGO && est.CODIGO.trim() == codigoURL
    );

    if (!persona) {
      contenedor.innerHTML = "<p>No encontrado</p>";
      return;
    }

    const estadoClase = persona.ESTADO === "ACTIVO" ? "activo" : "inactivo";
    const etiquetaCurso = persona.TIPO === "ESTUDIANTE" ? "Curso" : "Cargo";

    contenedor.innerHTML = `
      <div class="card">
        <div class="nombre">${persona.NOMBRE}</div>
        <div class="dato"><strong>${etiquetaCurso}:</strong> ${persona.CURSO}</div>
        <div class="dato">${persona.TIPO}</div>
        <div class="dato ${estadoClase}">${persona.ESTADO}</div>
      </div>
    `;
  });
</script>

</body>
</html>
